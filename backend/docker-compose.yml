services:
  api:
    build: .
    ports:
      - "8100:8100"
    environment:
      - DATABASE_URL=postgresql://isula:isula@host.docker.internal:5433/isula_vitrage
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:5173,https://gc-sial.vercel.app
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
