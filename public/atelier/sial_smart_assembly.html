<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SIAL Smart Assembly</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Source+Code+Pro:wght@400;600&family=Noto+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#07090c;--s1:#0d1117;--s2:#131a23;--s3:#1a2535;--brd:#1e2a3a;--brd2:#263447;--acc:#c8a84b;--acc2:#4b8fc8;--grn:#4bc87a;--red:#c84b4b;--text:#d4dfee;--mid:#6b8099;--dim:#3a4f65;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{display:flex;flex-direction:column;font-family:'Noto Sans',sans-serif;color:var(--text)}
.hd{background:var(--s1);border-bottom:1px solid var(--brd2);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative}
.hd::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:3px;color:var(--acc)}
.logo em{display:block;font-size:9px;font-weight:500;letter-spacing:2px;color:var(--mid);font-style:normal;margin-top:1px}
.hd-right{display:flex;align-items:center;gap:10px}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
.conn-dot.ok{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.conn-dot.err{background:var(--red)}
.hd-of{font-family:'Source Code Pro',monospace;font-size:11px;color:var(--mid);letter-spacing:.5px}
.screen{display:none;flex:1;overflow:hidden;flex-direction:column}
.screen.active{display:flex}
.scan-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px}
.scan-logo-big{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:48px;letter-spacing:4px;color:var(--acc);text-align:center}
.scan-logo-big em{display:block;font-size:14px;font-style:normal;letter-spacing:3px;color:var(--mid);margin-top:2px}
.scan-prompt{background:var(--s2);border:2px solid var(--brd2);border-radius:var(--radius);padding:20px 24px;text-align:center;max-width:380px;width:100%}
.scan-prompt.active-scan{border-color:var(--acc2);box-shadow:0 0 0 3px rgba(75,143,200,.15)}
.scan-icon{font-size:52px;margin-bottom:10px}
.scan-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:1px;color:var(--text);margin-bottom:4px}
.scan-sub{font-size:13px;color:var(--mid)}
.scan-input{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px}
.scan-stats{display:flex;gap:12px;justify-content:center}
.stat-box{background:var(--s2);border:1px solid var(--brd);border-radius:8px;padding:10px 16px;text-align:center;min-width:90px}
.stat-n{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--acc);line-height:1}
.stat-l{font-size:11px;color:var(--mid);margin-top:2px;letter-spacing:.5px}
.scan-err{background:rgba(200,75,75,.1);border:1px solid var(--red);border-radius:8px;padding:12px 16px;color:var(--red);font-size:14px;text-align:center;display:none;max-width:380px;width:100%}
.btn-manual{background:transparent;border:1px solid var(--brd2);border-radius:8px;color:var(--mid);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;letter-spacing:1px;padding:10px 20px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.btn-manual:hover{border-color:var(--acc2);color:var(--acc2)}
.guide-wrap{flex:1;display:flex;overflow:hidden}
.zone-schema{width:42%;background:var(--s1);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0}
.schema-hd{padding:10px 14px;border-bottom:1px solid var(--brd);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;color:var(--mid);text-transform:uppercase;flex-shrink:0}
.schema-svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden}
#mainSVG{width:100%;height:100%;max-height:340px}
.schema-footer{padding:8px 14px;border-top:1px solid var(--brd);font-size:11px;color:var(--dim);flex-shrink:0;line-height:1.5}
.zone-info{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.of-banner{background:var(--s2);border-bottom:1px solid var(--brd);padding:10px 14px;flex-shrink:0}
.of-ref{font-family:'Source Code Pro',monospace;font-size:11px;color:var(--acc);letter-spacing:.5px}
.of-type{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-top:2px}
.of-dims{font-size:12px;color:var(--mid);margin-top:1px}
.etape-card{margin:12px;background:var(--s2);border:1px solid var(--brd2);border-radius:var(--radius);padding:14px;flex-shrink:0}
.etape-num{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;color:var(--mid);text-transform:uppercase;margin-bottom:6px}
.etape-ref{font-family:'Source Code Pro',monospace;font-size:15px;font-weight:600;color:var(--acc);margin-bottom:4px}
.etape-desc{font-size:15px;color:var(--text);font-weight:500;line-height:1.4;margin-bottom:8px}
.etape-meta{display:flex;gap:8px;flex-wrap:wrap}
.etag{font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid;font-family:'Source Code Pro',monospace;letter-spacing:.5px}
.etag-fin{color:var(--acc2);border-color:var(--acc2);background:rgba(75,143,200,.08)}
.etag-qte{color:var(--grn);border-color:var(--grn);background:rgba(75,200,122,.08)}
.etag-cas{color:var(--acc);border-color:var(--acc);background:rgba(200,168,75,.08)}
.led-ind{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 10px;background:var(--s1);border-radius:7px;border:1px solid var(--brd)}
.led-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.led-txt{font-size:12px;color:var(--mid)}
.led-cas{font-weight:600;color:var(--text)}
.btn-fait{margin:0 12px 12px;background:var(--grn);border:none;border-radius:var(--radius);color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;letter-spacing:2px;padding:16px;cursor:pointer;text-transform:uppercase;transition:all .15s;flex-shrink:0}
.btn-fait:active{transform:scale(.97)}
.btn-fait:disabled{background:var(--brd2);color:var(--dim);cursor:not-allowed}
.pieces-hd{padding:8px 14px;border-bottom:1px solid var(--brd);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;color:var(--mid);text-transform:uppercase;flex-shrink:0}
.pieces-list{flex:1;overflow-y:auto;padding:8px 12px;scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
.piece-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;margin-bottom:4px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.piece-row.active{background:var(--s2);border-color:var(--acc);box-shadow:0 0 0 1px rgba(200,168,75,.2)}
.piece-row.done{opacity:.38}
.piece-row.done .pr-ref{text-decoration:line-through}
.pr-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.pr-info{flex:1;min-width:0}
.pr-ref{font-family:'Source Code Pro',monospace;font-size:11px;font-weight:600;color:var(--acc);line-height:1.2}
.pr-desc{font-size:12px;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.pr-qte{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;color:var(--text);flex-shrink:0}
.pr-check{font-size:16px;flex-shrink:0}
.complet-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;text-align:center}
.complet-icon{font-size:72px}
.complet-title{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;color:var(--grn);letter-spacing:2px}
.complet-sub{font-size:14px;color:var(--mid)}
.btn-next-of{background:var(--acc);border:none;border-radius:var(--radius);color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:16px;letter-spacing:2px;padding:14px 32px;cursor:pointer;text-transform:uppercase}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:var(--s2);border:1px solid var(--brd2);border-radius:var(--radius);padding:24px;max-width:340px;width:90%}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:12px}
.modal-input{width:100%;background:var(--s1);border:1px solid var(--brd2);border-radius:7px;padding:12px;color:var(--acc);font-family:'Source Code Pro',monospace;font-size:20px;text-align:center;outline:none;margin-bottom:12px}
.modal-input:focus{border-color:var(--acc2)}
.modal-btns{display:flex;gap:10px}
.modal-ok{flex:1;background:var(--acc);border:none;border-radius:7px;color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;padding:12px;cursor:pointer;text-transform:uppercase}
.modal-cancel{background:transparent;border:1px solid var(--brd2);border-radius:7px;color:var(--mid);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;padding:12px 16px;cursor:pointer;text-transform:uppercase}
</style>
</head>
<body>
<header class="hd">
  <div class="logo">SIAL <em>SMART ASSEMBLY</em></div>
  <div class="hd-right">
    <span class="hd-of" id="hdOf"></span>
    <div class="conn-dot" id="connDot" title="Connexion API"></div>
  </div>
</header>
<div class="screen active" id="scScan">
  <div class="scan-wrap">
    <div class="scan-logo-big">SIAL <em>ATELIER MONTAGE</em></div>
    <div class="scan-prompt" id="scanPrompt">
      <div class="scan-icon">&#x1F4F7;</div>
      <div class="scan-title">SCANNER LA FICHE</div>
      <div class="scan-sub">Pointez le lecteur vers le code-barres PRO F2</div>
    </div>
    <div class="scan-err" id="scanErr"></div>
    <div class="scan-stats">
      <div class="stat-box"><div class="stat-n" id="statJour">0</div><div class="stat-l">AUJOURD'HUI</div></div>
      <div class="stat-box"><div class="stat-n" id="statTotal">0</div><div class="stat-l">EN MEMOIRE</div></div>
    </div>
    <button class="btn-manual" onclick="openManual()">Saisie manuelle</button>
  </div>
  <input class="scan-input" id="scanInput" type="text" autocomplete="off" autofocus>
</div>
<div class="screen" id="scGuide">
  <div class="guide-wrap">
    <div class="zone-schema">
      <div class="schema-hd">SCHEMA DE MONTAGE</div>
      <div class="schema-svg-wrap"><svg id="mainSVG" viewBox="0 0 300 380" xmlns="http://www.w3.org/2000/svg"></svg></div>
      <div class="schema-footer" id="schemaFooter">&mdash;</div>
    </div>
    <div class="zone-info">
      <div class="of-banner">
        <div class="of-ref" id="ofRef">&mdash;</div>
        <div class="of-type" id="ofType">&mdash;</div>
        <div class="of-dims" id="ofDims">&mdash;</div>
      </div>
      <div class="etape-card" id="etapeCard">
        <div class="etape-num" id="etapeNum">ETAPE 1 / &mdash;</div>
        <div class="etape-ref" id="etapeRef">&mdash;</div>
        <div class="etape-desc" id="etapeDesc">&mdash;</div>
        <div class="etape-meta" id="etapeMeta"></div>
        <div class="led-ind" id="ledInd">
          <div class="led-dot" id="ledDot" style="background:#555;color:#555"></div>
          <div class="led-txt">Casier <span class="led-cas" id="ledCas">&mdash;</span></div>
        </div>
      </div>
      <button class="btn-fait" id="btnFait" onclick="validerEtape()">FAIT</button>
      <div class="pieces-hd" id="piecesHd">TOUTES LES PIECES</div>
      <div class="pieces-list" id="piecesList"></div>
    </div>
  </div>
</div>
<div class="screen" id="scComplet">
  <div class="complet-wrap">
    <div class="complet-icon">&#x2705;</div>
    <div class="complet-title">MONTAGE TERMINE</div>
    <div class="complet-sub" id="completSub">Toutes les pieces ont ete montees.</div>
    <button class="btn-next-of" onclick="retourScan()">MENUISERIE SUIVANTE</button>
  </div>
</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeManual()">
  <div class="modal">
    <div class="modal-title">Saisie manuelle</div>
    <input class="modal-input" id="manualInput" placeholder="Code-barres..." maxlength="30" autocomplete="off" onkeydown="if(event.key==='Enter')lookupManual()">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeManual()">Annuler</button>
      <button class="modal-ok" onclick="lookupManual()">VALIDER</button>
    </div>
  </div>
</div>
<script>
const API = window.SIAL_API || 'http://192.168.1.10:8080';
let currentData = null, statJour = 0, statTotal = 0;
const $ = id => document.getElementById(id);
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}

async function checkConn(){try{const r=await fetch(`${API}/api/health`,{signal:AbortSignal.timeout(2000)});const d=await r.json();$('connDot').className='conn-dot ok';statTotal=d.db_size||0;$('statTotal').textContent=statTotal}catch{$('connDot').className='conn-dot err'}}
checkConn();setInterval(checkConn,10000);

let scanBuffer='',scanTimer=null;
const scanInput=$('scanInput');
document.addEventListener('click',e=>{if(!e.target.closest('.modal')&&!e.target.closest('button')&&!e.target.closest('input'))scanInput.focus()});
scanInput.focus();
scanInput.addEventListener('input',()=>{scanBuffer=scanInput.value;clearTimeout(scanTimer);scanTimer=setTimeout(()=>{if(scanBuffer.length>=10)processBarcode(scanBuffer.trim());scanBuffer='';scanInput.value=''},200)});
scanInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&scanBuffer.length>=10){clearTimeout(scanTimer);processBarcode(scanBuffer.trim());scanBuffer='';scanInput.value=''}});

async function processBarcode(code){$('scanErr').style.display='none';$('scanPrompt').classList.add('active-scan');try{const r=await fetch(`${API}/api/scan/${encodeURIComponent(code)}`);if(!r.ok){showScanError(`Code non trouve: ${code}`);return}const data=await r.json();loadMontage(data);statJour++;$('statJour').textContent=statJour}catch(e){showScanError(`Erreur reseau: ${e.message}`)}finally{$('scanPrompt').classList.remove('active-scan');scanInput.focus()}}
function showScanError(msg){const el=$('scanErr');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',5000)}

function loadMontage(data){currentData=data;$('hdOf').textContent=`${data.lot||''} pos${data.pos||''}`;$('ofRef').textContent=`${data.commande||''} ${(data.barcode||'').slice(-6)}`;$('ofType').textContent=data.type_ouverture||'';$('ofDims').textContent=[data.gamme,data.lff_mm&&data.hff_mm?`${data.lff_mm}x${data.hff_mm}mm`:'',data.sens?`Sens ${data.sens}`:'',data.local||''].filter(Boolean).join(' | ');$('schemaFooter').textContent=[data.matiere,data.conf,data.teinte,data.poids_kg?`${data.poids_kg}kg`:''].filter(Boolean).join(' | ');drawSchema(data);renderPiecesList(data);renderEtape(data);showScreen('scGuide');scanInput.focus()}

function renderEtape(data){const ferco=data.ferco||[],etape=data.etape_courante||0,total=ferco.length;if(etape>=total){showComplet(data);return}const p=ferco[etape];$('etapeNum').textContent=`ETAPE ${etape+1} / ${total}`;$('etapeRef').textContent=p.ref;$('etapeDesc').textContent=p.desc;$('etapeMeta').innerHTML=`<span class="etag etag-qte">x${p.qte}</span><span class="etag etag-fin">${p.finition}</span>${p.casier?`<span class="etag etag-cas">CASIER ${p.casier}</span>`:''}`;const col=p.couleur||'#555555';$('ledDot').style.background=col;$('ledDot').style.color=col;$('ledCas').textContent=p.casier?`${p.casier} - ${p.label}`:'non assigne';$('ledInd').style.borderColor=col+'44';highlightSVG(p.ref,col);renderPiecesList(data)}

async function validerEtape(){if(!currentData)return;const bc=currentData.barcode;$('btnFait').disabled=true;try{const r=await fetch(`${API}/api/etape/${encodeURIComponent(bc)}`,{method:'POST'});if(r.ok){currentData=await r.json();renderEtape(currentData)}}catch{const ferco=currentData.ferco||[],etape=currentData.etape_courante||0;if(etape<ferco.length)ferco[etape].fait=true;currentData.etape_courante=etape+1;renderEtape(currentData)}finally{$('btnFait').disabled=false;scanInput.focus()}}

function renderPiecesList(data){const ferco=data.ferco||[],etape=data.etape_courante||0,nb=ferco.filter(p=>p.fait).length;$('piecesHd').textContent=`PIECES - ${nb}/${ferco.length}`;$('piecesList').innerHTML=ferco.map((p,i)=>`<div class="piece-row${i===etape?' active':''}${p.fait?' done':''}" onclick="jumpEtape(${i})"><div class="pr-dot" style="background:${p.couleur||'#555'}"></div><div class="pr-info"><div class="pr-ref">${p.ref}</div><div class="pr-desc">${p.desc}</div></div><div class="pr-qte">x${p.qte}</div><div class="pr-check">${p.fait?'done':(i===etape?'>>':'o')}</div></div>`).join('')}
function jumpEtape(i){if(!currentData)return;currentData.etape_courante=i;renderEtape(currentData)}

function showComplet(data){$('completSub').textContent=`${data.lot||''} | ${data.type_ouverture||''} | ${data.lff_mm}x${data.hff_mm}mm | ${(data.ferco||[]).length} pieces`;showScreen('scComplet')}
function retourScan(){currentData=null;$('hdOf').textContent='';showScreen('scScan');scanInput.focus()}

let svgParts={};
function drawSchema(data){const svg=$('mainSVG'),W=300,H=380,isOB=(data.conf||'OF')==='OB',sensR=data.sens!=='L',ferco=data.ferco||[];svgParts={};let h=`<rect width="${W}" height="${H}" fill="#07090c" rx="4"/>`;h+=`<text x="${W/2}" y="18" fill="#3a4f65" font-family="Rajdhani,sans-serif" font-size="11" font-weight="600" text-anchor="middle">${data.lff_mm||''}x${data.hff_mm||''}mm${isOB?' OB':' OF'}</text>`;const fr={x:22,y:26,w:256,h:330};h+=`<rect x="${fr.x}" y="${fr.y}" width="${fr.w}" height="${fr.h}" fill="none" stroke="#253d55" stroke-width="16" rx="2"/>`;h+=`<rect x="${fr.x}" y="${fr.y}" width="${fr.w}" height="${fr.h}" fill="none" stroke="#1a2a3a" stroke-width="10" rx="2"/>`;const vx=fr.x+10,vy=fr.y+10,vw=fr.w-20,vh=fr.h-20;h+=`<rect x="${vx}" y="${vy}" width="${vw}" height="${vh}" fill="#060b12" stroke="#1e2d3d" stroke-width="6" rx="1"/>`;h+=`<rect x="${vx+10}" y="${vy+10}" width="${vw-20}" height="${vh-20}" fill="#040810" stroke="#0f1820" stroke-width="1" rx="1"/>`;const fraX=sensR?vx+vw:vx;
ferco.forEach(piece=>{const ref=piece.ref,col=piece.couleur||'#555',desc=(piece.desc||'').toLowerCase();let el=null;if(/cremone/i.test(desc)){const cH=Math.min(vh*0.6,200),cY=vy+(vh-cH)/2;el=`<rect x="${sensR?fraX-7:fraX}" y="${cY}" width="7" height="${cH}" fill="${col}" rx="2" data-ref="${ref}" class="sp" opacity=".9"/>`}else if(/renvoi.angle/i.test(desc)){el=`<rect x="${sensR?vx+2:vx+vw-42}" y="${vy}" width="40" height="8" fill="${col}" rx="2" data-ref="${ref}" class="sp" opacity=".88"/>`}else if(/compas/i.test(desc)&&!/cache|palier|support|axe|douille|fiche/i.test(desc)){const tH=Math.min(vh*0.4,160);el=`<rect x="${sensR?vx:vx+vw-7}" y="${vy+12}" width="7" height="${tH}" fill="${col}" rx="2" data-ref="${ref}" class="sp" opacity=".85"/>`}else if(/verrouillage lat/i.test(desc)){const fH=Math.min(vh*0.35,140);el=`<rect x="${sensR?vx:vx+vw-7}" y="${vy+18}" width="7" height="${fH}" fill="${col}" rx="2" data-ref="${ref}" class="sp" opacity=".85"/>`}else if(/verrouilleur anti/i.test(desc)){el=`<rect x="${sensR?fraX-7:fraX}" y="${vy+12}" width="7" height="20" fill="${col}" rx="2" data-ref="${ref}" class="sp" opacity=".85"/>`}else if(/gache galet|gache ad/i.test(desc)){const gx=sensR?fr.x:fr.x+fr.w-8;el=`<rect x="${gx}" y="${vy+vh*0.35}" width="8" height="10" fill="${col}" rx="1" data-ref="${ref}" class="sp" opacity=".85"/>`}else if(/gache tringle|gache batt/i.test(desc)){const gx2=sensR?fr.x:fr.x+fr.w-8;el=`<rect x="${gx2}" y="${vy+vh*0.65}" width="8" height="14" fill="${col}" rx="1" data-ref="${ref}" class="sp" opacity=".85"/>`}else if(/limiteur|verrou/i.test(desc)){el=`<rect x="${sensR?fraX-6:fraX}" y="${vy+vh-60}" width="6" height="20" fill="${col}" rx="2" data-ref="${ref}" class="sp" opacity=".85"/>`}
if(el){h+=el;svgParts[ref]=true}});
